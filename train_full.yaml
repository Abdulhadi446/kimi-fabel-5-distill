### model
model_name_or_path: moonshotai/Kimi-VL-A3B-Thinking-2506
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full          # full fine-tuning, all weights updated

### dataset
dataset: kimi_vl_sft
dataset_dir: ./data
template: kimi_vl
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: ./kimi-vl-full-out
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### training
per_device_train_batch_size: 2
gradient_accumulation_steps: 4    # effective batch = 8
learning_rate: 2.0e-5             # lower LR for full fine-tuning vs LoRA
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true      # saves VRAM during backward pass
ddp_timeout: 180000000

### deepspeed (ZeRO-2 — shards optimizer + gradients, offloads to your 32GB RAM)
deepspeed: ds_config.json
