### model
model_name_or_path: moonshotai/Kimi-VL-A3B-Thinking-2506
trust_remote_code: true

### quantization — loads model in 4-bit (~8GB), fits on single T4
quantization_bit: 4
quantization_method: bitsandbytes

### method
stage: sft
do_train: true
finetuning_type: lora

### lora
lora_target: all
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

### dataset
dataset: kimi_vl_sft
dataset_dir: ./data
template: kimi_vl
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: ./kimi-vl-qlora-out
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### training — conservative settings for T4
per_device_train_batch_size: 1
gradient_accumulation_steps: 8    # effective batch = 8
learning_rate: 1.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.05
fp16: true                        # T4 doesn't support bf16, use fp16
gradient_checkpointing: true
ddp_timeout: 180000000
