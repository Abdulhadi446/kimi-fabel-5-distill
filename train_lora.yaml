### model
model_name_or_path: moonshotai/Kimi-VL-A3B-Thinking-2506
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora

### lora config
lora_target: all          # targets all linear layers automatically
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

### dataset
dataset: kimi_vl_sft
dataset_dir: .            # folder containing dataset_info.json and opt1_sharegpt.json
template: kimi_vl         # Kimi-VL chat template built into LLaMA-Factory
cutoff_len: 4096
max_samples: 100000       # cap if needed, remove to use all
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: ./kimi-vl-lora-out
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### training
per_device_train_batch_size: 1
gradient_accumulation_steps: 8   # effective batch = 8
learning_rate: 1.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000

### quantization (use if VRAM < 24GB)
# quantization_bit: 4      # uncomment for 4-bit QLoRA (~14GB VRAM)
# quantization_method: bitsandbytes

### evaluation (optional)
# val_size: 0.05
# eval_strategy: steps
# eval_steps: 100
# per_device_eval_batch_size: 1
